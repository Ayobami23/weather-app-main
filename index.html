<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- displays site properly based on user's device -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <!-- Title   -->
  <title>Frontend Mentor | Weather app</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- Container carrying all the pages content -->
  <div class="container">

    <!-- Navgiation bar -->
    <nav class="main-nav">
      <img src="./assets/images/logo.svg" alt="Weather App Logo">
      <button class="units-toggle">
        <img src="./assets/images/icon-units.svg" alt="Thermometer Icon">
        <span>Units</span>
        <img src="./assets/images/icon-dropdown.svg" alt="Arrow Down Icon">
      </button>
    </nav>
    <!-- Navigation bar end -->

    <!-- Hero Section  -->
     <section class="hero">
      <h1>How's the sky looking today?</h1>
      <form class="search-form">
        <div class="search-input">
          <img src="./assets/images/icon-search.svg" alt="Search Icon">
          <input type="text" placeholder="Search for a place..." required>
        </div>
        <button type="submit">Search</button>
      </form>

      <!-- Display Goes Here -->
        <div class="hero-grid">

          <!-- First Column  -->
          <div class="box1">
            <!-- Country Name -->
            <div class="country">
              <p>Loading...</p>
            </div>

            <!-- Temeprature grid -->
            <div class="temperature-grid">
              <div class="feels-like">
                <p>Feels like</p>
              </div>
              <div class="humidity">
                <p>Humidity</p>
              </div>
              <div class="wind">
                <p>Wind</p>
              </div>
              <div class="precipitation">
                <p>Precipitation</p>
              </div>
            </div>

            <!-- Daily Forecast grid -->
            <div class="daily-forecast-grid">
              <p>Daily Forecast</p>
              <div class="forecast-grid">
                <div class="day1">
                  <small>Day 1</small>
                </div>
                <div class="day2">
                  <small>Day 2</small>
                </div> 
                <div class="day3">
                  <small>Day 3</small>
                </div>
                <div class="day4">
                  <small>Day 4</small>
                </div>
                <div class="day5">
                  <small>Day 5</small>
                </div>
                <div class="day6">
                  <small>Day 6</small>
                </div>
                <div class="day7">
                  <small>Day 7</small>
                </div>      
              </div>
            </div>
          </div>

          <!-- Second Column  -->
          <div class="box2">

          </div>
        </div>
      <!-- Display Ends Here -->
     </section>
    <!-- Hero Section end -->

    <a href="error.html" target="_blank" rel="noopener noreferrer">Error Page</a>



    
  </div>

</html>
